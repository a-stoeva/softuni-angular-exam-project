<div class="tale-card">

    <img class="img" [src]="tale.img" [alt]="tale.title">
    <h3 class="title">{{tale.title}}</h3>
    <p>Country: <span>{{tale.country}}</span></p>
    <p>City: <span>{{tale.city}}</span></p>
    <p>Cost: <span>{{tale.cost}}</span></p>
    <a href="">More details</a>

</div>
